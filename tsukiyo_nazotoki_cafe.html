<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>月夜の謎解き喫茶</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    overscroll-behavior: none;
    touch-action: manipulation;
  }

  body {
    background: #0a0812;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    min-height: 100dvh;
    font-family: 'Hiragino Mincho ProN', 'Yu Mincho', 'Georgia', serif;
    overflow: hidden;
  }

  #game-container {
    position: relative;
    width: 375px;
    height: 667px;
    overflow: hidden;
    background: #0a0812;
  }

  /* ===== 背景イラスト（フルスクリーン） ===== */
  #bg-image {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center top;
    z-index: 1;
  }

  #bg-color {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    background: #0a0812;
  }

  /* 輝度オーバーレイ */
  #brightness-overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 5;
    transition: background 0.3s ease;
  }

  /* ===== 月のしずくカウンター ===== */
  #moon-drop-counter {
    position: absolute;
    top: 12px; right: 12px;
    display: flex;
    align-items: center;
    gap: 5px;
    background: rgba(10,8,18,0.72);
    border: 1px solid rgba(180,150,220,0.4);
    border-radius: 20px;
    padding: 5px 12px;
    z-index: 100;
    font-size: 13px;
    color: #d4b8f0;
    letter-spacing: 0.05em;
  }

  /* ===== ダイアログボックス（画像に重なる半透明） ===== */
  #dialogue-box {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: rgba(6,4,14,0.82);
    border-top: 1px solid rgba(180,150,220,0.25);
    padding: 14px 18px 24px;
    z-index: 50;
    height: 200px;
    backdrop-filter: blur(8px);
    display: none;
  }

  #speaker-tag {
    display: inline-block;
    font-size: 12px;
    color: #c8a8e8;
    letter-spacing: 0.12em;
    background: rgba(80,50,130,0.5);
    border: 1px solid rgba(180,150,220,0.35);
    border-radius: 10px;
    padding: 2px 12px;
    margin-bottom: 10px;
    min-width: 60px;
    text-align: center;
  }
  #speaker-tag.hidden { visibility: hidden; }

  #dialogue-text {
    font-size: 15px;
    color: #ede8f5;
    line-height: 1.85;
    letter-spacing: 0.04em;
    min-height: 80px;
    text-align: left;
  }

  #tap-hint {
    position: absolute;
    bottom: 8px; right: 14px;
    font-size: 10px;
    color: rgba(180,150,220,0.5);
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:1} }

  #dialogue-back-btn {
    position: absolute;
    top: 10px; right: 16px;
    font-size: 11px;
    color: rgba(180,150,220,0.45);
    letter-spacing: 0.05em;
    cursor: pointer;
    z-index: 2;
  }

  /* ===== ナレーション（画像中央に重ねる） ===== */
  #narration-box {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: rgba(6,4,14,0.78);
    border-top: 1px solid rgba(180,150,220,0.2);
    padding: 18px 20px 28px;
    z-index: 50;
    min-height: 180px;
    backdrop-filter: blur(8px);
    display: none;
    cursor: pointer;
  }

  #narration-text {
    font-size: 15px;
    color: #ddd8ee;
    line-height: 2;
    letter-spacing: 0.06em;
    text-align: left;
    min-height: 90px;
    white-space: pre-wrap;
  }

  #narration-next-btn {
    display: block;
    margin: 12px auto 0;
    background: none;
    border: none;
    color: rgba(180,150,220,0.6);
    font-size: 11px;
    cursor: pointer;
    letter-spacing: 0.1em;
    animation: pulse 2s infinite;
  }

  #narration-back-btn {
    position: absolute;
    top: 10px; left: 14px;
    font-size: 11px;
    color: rgba(180,150,220,0.45);
    letter-spacing: 0.05em;
    cursor: pointer;
    z-index: 2;
  }

  /* ===== 選択肢 ===== */
  #choices-box {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: rgba(6,4,14,0.88);
    border-top: 1px solid rgba(180,150,220,0.25);
    padding: 12px 14px 22px;
    z-index: 50;
    backdrop-filter: blur(8px);
    display: none;
  }

  #choices-label {
    font-size: 12px;
    color: rgba(180,150,220,0.6);
    letter-spacing: 0.1em;
    margin-bottom: 10px;
    text-align: center;
  }

  .choice-btn {
    display: block;
    width: 100%;
    margin-bottom: 7px;
    padding: 11px 16px;
    background: rgba(60,40,100,0.35);
    border: 1px solid rgba(180,150,220,0.3);
    border-radius: 10px;
    color: #d8c8f0;
    font-size: 14px;
    font-family: inherit;
    letter-spacing: 0.04em;
    cursor: pointer;
    text-align: left;
    transition: background 0.2s;
  }
  .choice-btn:active { background: rgba(100,70,160,0.5); }

  /* ===== タップエリア ===== */
  .scene-shrink-wrap {
    position: absolute;
    top: 0; left: 0;
    width: 375px; height: 667px;
    transform-origin: top center;
    z-index: 5;
    background-size: cover;
    background-position: center top;
    background-repeat: no-repeat;
  }

  .tap-area {
    position: absolute;
    background: transparent;
    cursor: pointer;
    border-radius: 8px;
    z-index: 30;
  }
  .tap-area:active { background: rgba(255,220,100,0.12); }
  .tap-area.collected { pointer-events: none; }

  /* きらっ */
  .sparkle {
    position: absolute;
    pointer-events: none;
    z-index: 40;
    animation: sparkle-anim 0.7s ease forwards;
    font-size: 22px;
    color: #f0d060;
    text-shadow: 0 0 10px #f0d060;
  }
  @keyframes sparkle-anim {
    0%   { transform: scale(0) rotate(0deg); opacity: 1; }
    50%  { transform: scale(1.6) rotate(180deg); opacity: 1; }
    100% { transform: scale(0.3) rotate(360deg); opacity: 0; }
  }

  /* ===== トースト ===== */
  #drop-toast {
    position: absolute;
    top: 48px; left: 50%;
    transform: translateX(-50%);
    background: rgba(50,30,90,0.92);
    border: 1px solid rgba(180,150,220,0.45);
    border-radius: 20px;
    padding: 7px 20px;
    color: #d4b8f0;
    font-size: 13px;
    letter-spacing: 0.08em;
    z-index: 200;
    display: none;
    white-space: nowrap;
  }

  /* ===== 探索クリアボタン ===== */
  #explore-next-btn {
    position: absolute;
    bottom: 22px; left: 50%;
    transform: translateX(-50%);
    background: rgba(70,45,120,0.75);
    border: 1px solid rgba(180,150,220,0.5);
    border-radius: 24px;
    color: #d4b8f0;
    font-family: inherit;
    font-size: 14px;
    letter-spacing: 0.1em;
    padding: 12px 30px;
    cursor: pointer;
    z-index: 60;
    display: none;
    animation: float-up 0.5s ease;
    white-space: nowrap;
  }
  @keyframes float-up {
    from { opacity:0; transform:translateX(-50%) translateY(12px); }
    to   { opacity:1; transform:translateX(-50%) translateY(0); }
  }

  /* ===== タイトル画面 ===== */
  #title-screen {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 80;
    background: rgba(6,4,18,0.65);
    backdrop-filter: blur(3px);
  }
  #title-ep {
    font-size: 12px;
    color: #c8a8e8;
    letter-spacing: 0.25em;
    margin-bottom: 14px;
  }
  #title-main {
    font-size: 22px;
    color: #ede8f5;
    letter-spacing: 0.1em;
    text-align: center;
    line-height: 1.7;
    margin-bottom: 44px;
    text-shadow: 0 0 28px rgba(180,150,220,0.5);
  }
  #title-start-btn {
    background: rgba(70,45,120,0.5);
    border: 1px solid rgba(180,150,220,0.5);
    border-radius: 22px;
    color: #d4b8f0;
    font-family: inherit;
    font-size: 14px;
    letter-spacing: 0.15em;
    padding: 12px 36px;
    cursor: pointer;
  }

  /* ===== 謎パズル ===== */
  #puzzle-box {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: rgba(6,4,14,0.9);
    border-top: 1px solid rgba(180,150,220,0.25);
    padding: 12px 14px 20px;
    z-index: 60;
    backdrop-filter: blur(10px);
    display: none;
  }
  #puzzle-prompt {
    font-size: 13px;
    color: #b8a0d8;
    letter-spacing: 0.04em;
    margin-bottom: 11px;
    line-height: 1.5;
  }
  #lamp-slider-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
  }
  #lamp-slider {
    -webkit-appearance: none;
    flex: 1;
    height: 4px;
    border-radius: 2px;
    background: linear-gradient(to right, #1a0f30, #f0c060);
    outline: none;
    cursor: pointer;
  }
  #lamp-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: #f0c060;
    box-shadow: 0 0 8px rgba(240,192,96,0.6);
    cursor: pointer;
  }
  #puzzle-choices { display: flex; flex-direction: column; gap: 6px; }
  .puzzle-choice-btn {
    padding: 10px 14px;
    border-radius: 9px;
    border: 1px solid rgba(180,150,220,0.3);
    background: rgba(60,40,100,0.25);
    color: #d8c8f0;
    font-family: inherit;
    font-size: 14px;
    letter-spacing: 0.04em;
    cursor: pointer;
    text-align: left;
    transition: all 0.3s;
  }
  .puzzle-choice-btn.hidden-card {
    opacity: 0.15;
    pointer-events: none;
    filter: blur(1.5px);
  }
  .puzzle-choice-btn.card-c-unlocked {
    border-color: rgba(240,192,96,0.65);
    background: rgba(80,60,20,0.35);
    box-shadow: 0 0 10px rgba(240,192,96,0.2);
  }

  /* ヒントボタン */
  #bgm-mute-btn {
    position: absolute;
    top: 50px; right: 12px;
    background: rgba(10,8,18,0.72);
    border: 1px solid rgba(180,150,220,0.4);
    border-radius: 20px;
    color: #d4b8f0;
    font-family: inherit;
    font-size: 13px;
    padding: 4px 9px;
    cursor: pointer;
    z-index: 100;
    line-height: 1;
  }

  #hint-btn {
    position: absolute;
    top: 12px; left: 12px;
    background: rgba(50,30,90,0.72);
    border: 1px solid rgba(180,150,220,0.35);
    border-radius: 16px;
    color: #c8a8e8;
    font-family: inherit;
    font-size: 12px;
    letter-spacing: 0.04em;
    padding: 5px 12px;
    cursor: pointer;
    z-index: 100;
    display: none;
  }

  /* ===== フェード ===== */
  #fade-overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: black;
    opacity: 0;
    pointer-events: none;
    z-index: 999;
    transition: opacity 0.5s ease;
  }

  /* ===== ポップアップ ===== */
  #popup-box {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 84%;
    background: rgba(16,10,32,0.96);
    border: 1px solid rgba(180,150,220,0.4);
    border-radius: 14px;
    padding: 20px 18px;
    z-index: 150;
    display: none;
    text-align: center;
  }
  #popup-text {
    font-size: 14px;
    color: #ede8f5;
    line-height: 1.85;
    letter-spacing: 0.04em;
    margin-bottom: 16px;
    white-space: pre-wrap;
  }
  #popup-btn-row {
    display: flex;
    gap: 10px;
    justify-content: center;
  }
  #popup-ok-btn {
    background: rgba(70,45,120,0.5);
    border: 1px solid rgba(180,150,220,0.4);
    border-radius: 16px;
    color: #d4b8f0;
    font-family: inherit;
    font-size: 13px;
    padding: 8px 24px;
    cursor: pointer;
    letter-spacing: 0.1em;
  }
  #popup-cancel-btn {
    background: rgba(40,30,50,0.4);
    border: 1px solid rgba(150,120,180,0.3);
    border-radius: 16px;
    color: #b8a8c8;
    font-family: inherit;
    font-size: 13px;
    padding: 8px 20px;
    cursor: pointer;
    letter-spacing: 0.08em;
    display: none;
  }

  /* ===== 言葉ゲット ===== */
  #word-get-screen {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 90;
    background: rgba(6,4,18,0.88);
    backdrop-filter: blur(5px);
  }
  #word-get-label {
    font-size: 11px;
    color: #b8a0d8;
    letter-spacing: 0.25em;
    margin-bottom: 18px;
  }
  #word-get-text {
    font-size: 30px;
    color: #f0e0b0;
    letter-spacing: 0.18em;
    text-shadow: 0 0 24px rgba(240,192,96,0.55);
    margin-bottom: 42px;
  }
  #word-get-continue {
    background: rgba(70,45,120,0.5);
    border: 1px solid rgba(180,150,220,0.4);
    border-radius: 20px;
    color: #d4b8f0;
    font-family: inherit;
    font-size: 13px;
    padding: 10px 28px;
    cursor: pointer;
    letter-spacing: 0.1em;
  }
  /* ===== 謎2：本棚パズル ===== */
  .book-tap-area {
    position: absolute;
    background: transparent;
    cursor: pointer;
    z-index: 30;
    border-radius: 6px;
  }
  .book-tap-area:active { background: rgba(255,220,100,0.18); }

  #book-closeup-screen {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 120;
    background: rgba(6,4,16,0.92);
    backdrop-filter: blur(4px);
  }

  #book-closeup-cover {
    width: 150px;
    height: 232px;
    border-radius: 8px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.6);
    margin-bottom: 16px;
    position: relative;
    background-size: cover;
    background-position: center;
  }

  #book-closeup-tap-title {
    width: 88%;
    font-size: 30px;
    font-weight: bold;
    color: #ffffff;
    letter-spacing: 0.1em;
    text-align: center;
    line-height: 1.8;
    margin-bottom: 16px;
    text-shadow: 0 0 14px rgba(255,255,255,0.25);
  }

  #book-closeup-note {
    font-size: 12px;
    color: rgba(200,180,220,0.6);
    letter-spacing: 0.08em;
    margin-bottom: 14px;
  }
  #book-closeup-collected {
    font-size: 20px;
    color: #f0e0b0;
    letter-spacing: 0.16em;
    text-align: center;
    min-height: 26px;
    margin-bottom: 22px;
    text-shadow: 0 0 12px rgba(240,192,96,0.35);
  }

  #book-closeup-close {
    background: rgba(70,45,120,0.5);
    border: 1px solid rgba(180,150,220,0.45);
    border-radius: 20px;
    color: #d4b8f0;
    font-family: inherit;
    font-size: 13px;
    padding: 9px 28px;
    cursor: pointer;
    letter-spacing: 0.1em;
  }

  /* 答え合わせ入力エリア */
  #answer-input-box {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: rgba(6,4,14,0.9);
    border-top: 1px solid rgba(180,150,220,0.25);
    padding: 8px 14px 10px;
    z-index: 60;
    backdrop-filter: blur(10px);
    display: none;
  }
  #answer-prompt {
    font-size: 11px;
    color: #b8a0d8;
    letter-spacing: 0.03em;
    margin-bottom: 4px;
    line-height: 1.3;
  }
  #answer-collected-display {
    font-size: 19px;
    color: #f0e0b0;
    letter-spacing: 0.18em;
    text-align: center;
    margin-bottom: 6px;
    min-height: 24px;
    text-shadow: 0 0 12px rgba(240,192,96,0.35);
  }
  #answer-submit-btn {
    display: block;
    background: rgba(70,45,120,0.4);
    border: 1px solid rgba(180,150,220,0.4);
    border-radius: 10px;
    color: #d8c8f0;
    font-family: inherit;
    font-size: 13px;
    letter-spacing: 0.05em;
    padding: 9px;
    cursor: pointer;
  }
  #answer-submit-btn:disabled {
    opacity: 0.35;
    cursor: default;
  }

  /* ===== 謎4：テキスト入力パズル ===== */
  #text-puzzle-box {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: rgba(6,4,14,0.92);
    border-top: 1px solid rgba(180,150,220,0.25);
    padding: 14px 16px 20px;
    z-index: 60;
    backdrop-filter: blur(10px);
    display: none;
  }
  #text-puzzle-prompt {
    font-size: 13px;
    color: #b8a0d8;
    letter-spacing: 0.04em;
    margin-bottom: 12px;
    line-height: 1.5;
  }
  #text-puzzle-input {
    width: 100%;
    background: rgba(40,28,60,0.5);
    border: 1px solid rgba(180,150,220,0.4);
    border-radius: 10px;
    color: #ede8f5;
    font-family: inherit;
    font-size: 16px;
    letter-spacing: 0.1em;
    padding: 11px 14px;
    margin-bottom: 12px;
    outline: none;
    text-align: center;
  }
  #text-puzzle-input::placeholder { color: rgba(200,180,220,0.3); }
  #text-puzzle-submit {
    display: block;
    width: 100%;
    background: rgba(70,45,120,0.45);
    border: 1px solid rgba(180,150,220,0.4);
    border-radius: 10px;
    color: #d8c8f0;
    font-family: inherit;
    font-size: 14px;
    letter-spacing: 0.06em;
    padding: 11px;
    cursor: pointer;
  }

  /* ===== 謎3：ドラッグ式言葉はめパズル ===== */
  #drag-puzzle-screen {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: none;
    z-index: 70;
    background: rgba(6,4,16,0.5);
  }

  #drag-puzzle-prompt {
    position: absolute;
    top: 56px; left: 16px; right: 16px;
    font-size: 13px;
    color: #d8c8e8;
    text-align: center;
    letter-spacing: 0.05em;
    line-height: 1.6;
    text-shadow: 0 2px 8px rgba(0,0,0,0.8);
    z-index: 72;
  }

  #speech-bubble-target {
    position: absolute;
    top: 130px; left: 50%;
    transform: translateX(-50%);
    width: 220px;
    min-height: 100px;
    z-index: 71;
  }

  #speech-bubble-shape {
    position: relative;
    width: 100%;
    min-height: 100px;
    background: linear-gradient(165deg, #e9ddc2, #d8c9a3);
    border: 1px solid rgba(120,95,55,0.4);
    border-radius: 4px 14px 6px 16px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.45), inset 0 0 24px rgba(255,250,230,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    transition: all 0.3s;
  }
  #speech-bubble-shape::before {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 0; height: 0;
    border-top: 16px solid rgba(10,8,16,0.5);
    border-left: 16px solid transparent;
  }
  #speech-bubble-shape::after {
    content: '';
    position: absolute;
    bottom: 4px; left: 18px; right: 18px;
    height: 4px;
    background: repeating-linear-gradient(90deg, transparent 0 6px, rgba(120,95,55,0.3) 6px 8px);
  }
  #speech-bubble-shape.drag-over {
    background: linear-gradient(165deg, #f3e6b8, #e6d49a);
    border-color: rgba(200,150,60,0.6);
  }
  #speech-bubble-shape.shake {
    animation: bubble-shake 0.4s ease;
  }
  #speech-bubble-shape.crack {
    border-color: rgba(150,60,60,0.55);
    background: linear-gradient(165deg, #ded0b4, #cbb993);
  }
  @keyframes bubble-shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  #speech-bubble-label {
    color: rgba(70,55,35,0.55);
    font-size: 12px;
    letter-spacing: 0.05em;
    text-align: center;
  }
  #speech-bubble-label.filled {
    color: #3a2c18;
    font-size: 16px;
    letter-spacing: 0.08em;
  }

  #drag-words-area {
    position: absolute;

// ピンチズーム・ダブルタップズーム防止
// ============================================================
document.addEventListener('gesturestart', (e) => e.preventDefault());
document.addEventListener('gesturechange', (e) => e.preventDefault());
document.addEventListener('gestureend', (e) => e.preventDefault());
document.addEventListener('touchmove', (e) => {
  if (e.touches.length > 1) e.preventDefault();
}, { passive: false });
let __lastTouchEnd = 0;
document.addEventListener('touchend', (e) => {
  const now = Date.now();
  if (now - __lastTouchEnd <= 300) e.preventDefault();
  __lastTouchEnd = now;
}, { passive: false, capture: true });

// ============================================================
// タイプライター
// ============================================================
let typewriterTimer = null;

function typewrite(el, text, speed, onDone) {
  if (typewriterTimer) { clearInterval(typewriterTimer); typewriterTimer = null; }
  el.textContent = '';
  el.style.textAlign = 'left';
  let i = 0;
  typewriterTimer = setInterval(() => {
    el.textContent += text[i];
    i++;
    if (i >= text.length) {
      clearInterval(typewriterTimer);
      typewriterTimer = null;
      if (onDone) onDone();
    }
  }, speed || 70);
}

function skipTypewriter(el, text) {
  if (typewriterTimer) { clearInterval(typewriterTimer); typewriterTimer = null; }
  el.textContent = text;
}

// ============================================================
// 状態
// ============================================================
const state = {
  moonDrops: 0,
  collectedDrops: new Set(),
  exploredCount: 0,
  exploreCleared: false,
  hintIndex: 0,
  typing: false,

};

// ============================================================
// セーブ／ロード（謎単位のチェックポイント）
// ============================================================
const SAVE_KEY = 'tsukiyo_nazotoki_save_v1';

// checkpoint: 'puzzle1' | 'puzzle2' | 'puzzle3' | 'puzzle4' | 'ending'
function saveProgress(checkpoint) {
  try {
    const data = {
      checkpoint,
      moonDrops: state.moonDrops,
      collectedDrops: Array.from(state.collectedDrops),
      savedAt: Date.now(),
    };
    localStorage.setItem(SAVE_KEY, JSON.stringify(data));
  } catch (e) {
    // localStorageが使えない環境では何もしない（セーブ機能なしで継続）
    console.warn('セーブに失敗しました', e);
  }
}

function loadProgress() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch (e) {
    return null;
  }
}

function clearProgress() {
  try { localStorage.removeItem(SAVE_KEY); } catch (e) {}
}

// ============================================================
// 画面に全部収まらない謎用：画像全体を縮小して表示する仕組み
// ============================================================
function setupShrunkScene(imageKey) {
  $bg.style.display = 'none';
  let wrap = document.getElementById('scene-shrink-wrap');
  if (!wrap) {
    wrap = document.createElement('div');
    wrap.id = 'scene-shrink-wrap';
    wrap.className = 'scene-shrink-wrap';
    $container.appendChild(wrap);
  }
  wrap.innerHTML = '';
  const path = (IMAGES[imageKey]) || ('images/' + imageKey);
  wrap.style.backgroundImage = `url('${path}')`;
  wrap.style.transform = 'scale(1)';
  return wrap;
}

function fitShrunkSceneToAvailableHeight(wrap, reservedBottomHeight) {
  const available = 667 - reservedBottomHeight;
  const scale = Math.min(1, available / 667);
  wrap.style.transform = `scale(${scale})`;
}

function clearShrunkScene() {
  const wrap = document.getElementById('scene-shrink-wrap');
  if (wrap) wrap.remove();
  $bg.style.display = '';
}

// 情報量の多いポスター画像など、ナレーション欄(200px)に隠れず全体を見せたい時に使う
function setBgFullyVisible(imageKey, reservedBottom) {
  setTimeout(() => {
    const wrap = setupShrunkScene(imageKey);
    fitShrunkSceneToAvailableHeight(wrap, reservedBottom || 200);
  }, 0);
}

function showSparkle(x, y) {
  const sp = document.createElement('div');
  sp.className = 'sparkle';
  sp.textContent = '✦';
  sp.style.left = (x-11)+'px';
  sp.style.top  = (y-11)+'px';
  $container.appendChild(sp);
  setTimeout(()=>sp.remove(), 750);
}

function showPopup(text, cb) {
  $popupText.textContent = text;
  $popupBox.style.display = 'block';
  $popupCancelBtn.style.display = 'none';
  $popupOkBtn.textContent = 'OK';
  $popupOkBtn.onclick = () => {
    $popupBox.style.display = 'none';
    if (cb) cb();
  };
}

function showConfirm(text, onYes, onNo) {
  $popupText.textContent = text;
  $popupBox.style.display = 'block';
  $popupCancelBtn.style.display = 'inline-block';
  $popupOkBtn.textContent = 'はい';
  $popupCancelBtn.textContent = 'やめる';
  $popupOkBtn.onclick = () => {
    $popupBox.style.display = 'none';
    $popupCancelBtn.style.display = 'none';
    $popupOkBtn.textContent = 'OK';
    if (onYes) onYes();
  };
  $popupCancelBtn.onclick = () => {
    $popupBox.style.display = 'none';
    $popupCancelBtn.style.display = 'none';
    $popupOkBtn.textContent = 'OK';
    if (onNo) onNo();
  };
}

// ヒント消費の前に確認を挟む共通ヘルパー（cost=0なら確認なしで即実行）
function spendHintWithConfirm(cost, onProceed) {
  if (cost <= 0) { onProceed(); return; }
  if (state.moonDrops < cost) {
    showPopup(`月のしずくが${cost}個必要です。\n今：${state.moonDrops}個`, null);
    return;
  }
  showConfirm(`月のしずくを${cost}個使ってヒントを見ますか？\n（今の月のしずく：${state.moonDrops}個）`, () => {
    state.moonDrops -= cost;
    $dropCount.textContent = state.moonDrops;
    onProceed();
  });
}

// ============================================================
// ナレーション（タイプライター付き）
// ============================================================
function showNarration(texts, onEnd) {
  hideAll();
  let idx = 0;
  let done = false;

  function showLine() {
    done = false;
    $narText.textContent = '';
    $narBox.style.display = 'block';
    typewrite($narText, texts[idx], 70, () => { done = true; });
  }

  $narNext.onclick = (e) => {
    e.stopPropagation();
    advanceNarration();
  };
  $narBackBtn.onclick = (e) => {
    e.stopPropagation();
    if (idx > 0) {
      idx--;
      showLine();
    }
  };
  $narBox.onclick = () => advanceNarration();

  function advanceNarration() {
    if (!done) {
      // タイプ中→スキップして全文表示
      skipTypewriter($narText, texts[idx]);
      done = true;
      return;
    }
    idx++;
    if (idx >= texts.length) {
      hideAll();
      if (onEnd) onEnd();
    } else {
      showLine();
    }
  }

  showLine();
}

// 話者ごとの色分け設定
const SPEAKER_COLORS = {
  'ノワール': { bg: 'rgba(110,65,175,0.55)', border: 'rgba(180,140,230,0.55)', text: '#ecdcff' },
  'ミネット': { bg: 'rgba(195,115,35,0.55)', border: 'rgba(240,170,90,0.55)',  text: '#ffe4c4' },
  '澪':       { bg: 'rgba(45,125,85,0.55)',  border: 'rgba(110,205,150,0.55)', text: '#d4ffe2' },
};

function showDialogues(dialogues, onEnd) {
  hideAll();
  let idx = 0;
  let done = false;

  function showOne() {
    done = false;
    const d = dialogues[idx];
    const isNar = d.speaker === 'ナレーション' || d.speaker === 'システム' || d.speaker === '表示';

    if (isNar) {
      $speakerTag.classList.add('hidden');
    } else {
      $speakerTag.classList.remove('hidden');
      $speakerTag.textContent = d.speaker;
      const c = SPEAKER_COLORS[d.speaker];
      if (c) {
        $speakerTag.style.background = c.bg;
        $speakerTag.style.borderColor = c.border;
        $speakerTag.style.color = c.text;
      } else {
        $speakerTag.style.background = '';
        $speakerTag.style.borderColor = '';
        $speakerTag.style.color = '';
      }
    }
    $dialText.textContent = '';
    $dialBox.style.display = 'block';

    typewrite($dialText, d.text, 70, () => { done = true; });
  }

  $dialBackBtn.onclick = (e) => {
    e.stopPropagation();
    if (idx > 0) {
      idx--;
      showOne();
    }
  };

  $dialBox.onclick = () => {
    if (!done) {
      skipTypewriter($dialText, dialogues[idx].text);
      done = true;
      return;
    }
    idx++;
    if (idx >= dialogues.length) {
      hideAll();
      if (onEnd) onEnd();
    } else {
      showOne();
    }
  };

  showOne();
}

function updateBrightness(v) {
  if (v < 45) {
    const d = 0.72 - (v/45)*0.45;
    $brightOv.style.background = `rgba(0,0,0,${d.toFixed(2)})`;
  } else if (v <= 60) {
    $brightOv.style.background = 'rgba(0,0,0,0.04)';
  } else {
    const b = (v-60)/40;
    $brightOv.style.background = `rgba(255,238,190,${(b*0.72).toFixed(2)})`;
  }
}

function updateCards(v) {
  const correct = v >= 45 && v <= 60;
  const cC = document.getElementById('card-C');
  if (!cC) return;
  if (correct) {
    cC.className = 'puzzle-choice-btn card-c-unlocked';
    cC.disabled = false;
  } else {
    cC.className = 'puzzle-choice-btn hidden-card';
    cC.disabled = true;

function openBookCloseup(side, size, onClear) {
  const title = BOOKS[side][size];
  $bookCloseupCover.style.backgroundImage = `url('${BOOK_COVER_IMAGES[side][size]}')`;
  $bookCloseupTapTitle.innerHTML = '';
  [...title].forEach((ch, idx) => {
    const position = idx + 1;
    const span = document.createElement('span');
    span.textContent = ch;
    span.style.cssText = 'display:inline-block; cursor:pointer; padding:6px 10px; margin:3px 2px; border-radius:9px; transition:background 0.2s;';
    const isCollected = () => state.puzzle2.collectedChars.some(c => c.side===side && c.size===size && c.position===position);
    const refreshSpan = () => {
      span.style.background = isCollected() ? 'rgba(240,192,96,0.55)' : '';
    };
    refreshSpan();
    span.onclick = () => {
      if (isCollected()) {
        state.puzzle2.collectedChars = state.puzzle2.collectedChars.filter(c => !(c.side===side && c.size===size && c.position===position));
        showToast(`「${ch}」を外した`);
      } else {
        state.puzzle2.collectedChars.push({ ch, side, size, position });
        showToast(`「${ch}」を集めた`);
      }
      refreshSpan();
      renderAnswerSummary();
    };
    $bookCloseupTapTitle.appendChild(span);
  });
  $bookCloseupNote.textContent = `${sideLabel(side)}の本棚・${sizeLabel(size)}な本　文字をタップして集める（もう一度タップで取り消し）`;
  renderAnswerSummary();

  $bookCloseupClose.onclick = () => {

function buildDragWords(onClear) {
  $dragWordsArea.innerHTML = '';
  // シャッフルして表示
  const shuffled = [...PUZZLE3_WORDS].sort(() => Math.random() - 0.5);
  shuffled.forEach(word => {
    const card = document.createElement('div');
    card.className = 'drag-word-card';
    card.textContent = word.label;
    card.dataset.wordId = word.id;
    attachDragHandlers(card, word, onClear);
    $dragWordsArea.appendChild(card);
  });
}

function attachDragHandlers(card, word, onClear) {
  let startX, startY, origLeft, origTop, dragging = false;

  function getPoint(e) {
    if (e.touches && e.touches.length) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
    return { x: e.clientX, y: e.clientY };
  }

  function onStart(e) {
    e.preventDefault();
    dragging = true;
    const rect = card.getBoundingClientRect();
    const containerRect = $container.getBoundingClientRect();
    origLeft = rect.left - containerRect.left;
    origTop = rect.top - containerRect.top;
    const p = getPoint(e);
    startX = p.x; startY = p.y;

    card.style.position = 'absolute';
    card.style.left = origLeft + 'px';
    card.style.top = origTop + 'px';
    card.classList.add('dragging');
    $container.appendChild(card); // 最前面に移動

    document.addEventListener('mousemove', onMove);
    document.addEventListener('touchmove', onMove, { passive:false });
    document.addEventListener('mouseup', onEnd);
    document.addEventListener('touchend', onEnd);
  }

  function onMove(e) {
    if (!dragging) return;
    e.preventDefault();
    const p = getPoint(e);
    const dx = p.x - startX;
    const dy = p.y - startY;
    card.style.left = (origLeft + dx) + 'px';
    card.style.top = (origTop + dy) + 'px';

    // バブルとの重なり判定でハイライト
    if (isOverBubble(card)) {
      $speechBubbleShape.classList.add('drag-over');
    } else {
      $speechBubbleShape.classList.remove('drag-over');
    }
  }

  function onEnd(e) {
    if (!dragging) return;
    dragging = false;
    card.classList.remove('dragging');
    $speechBubbleShape.classList.remove('drag-over');
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('touchmove', onMove);
    document.removeEventListener('mouseup', onEnd);
    document.removeEventListener('touchend', onEnd);

    if (isOverBubble(card)) {
      handleDrop(word, card, onClear);
    } else {
      // 元の位置へ戻す（簡易：もう一度buildDragWordsで再配置）
      card.classList.add('returning');
      buildDragWords(onClear);
    }
  }

  card.addEventListener('mousedown', onStart);
  card.addEventListener('touchstart', onStart, { passive:false });
}

function isOverBubble(card) {
  const cardRect = card.getBoundingClientRect();
  const bubbleRect = $speechBubbleShape.getBoundingClientRect();
  const cardCenterX = cardRect.left + cardRect.width / 2;
  const cardCenterY = cardRect.top + cardRect.height / 2;
  return (
    cardCenterX > bubbleRect.left &&
    cardCenterX < bubbleRect.right &&
    cardCenterY > bubbleRect.top &&
    cardCenterY < bubbleRect.bottom
  );
}

function handleDrop(word, card, onClear) {
  if (word.correct) {
    // 正解演出
    $speechBubbleShape.classList.remove('crack');
    $speechBubbleLabel.textContent = word.label;
    $speechBubbleLabel.classList.add('filled');
    card.remove();
    setTimeout(() => {
      hideAll();
      showPuzzle3Correct(onClear);
    }, 700);
  } else {
    // 不正解演出：一瞬はまるが崩れる
    $speechBubbleLabel.textContent = word.label;
    $speechBubbleShape.classList.add('shake');
    card.style.opacity = '0.3';
    setTimeout(() => {
      $speechBubbleShape.classList.remove('shake');
      $speechBubbleShape.classList.add('crack');
      $speechBubbleLabel.textContent = 'ここに言葉をはめる';
      $speechBubbleLabel.classList.remove('filled');
      const feedback = PUZZLE3_WRONG_FEEDBACK[word.feedback];
      hideAll();
      showDialogues(feedback, () => showPuzzle3Question(onClear));
    }, 500);
  }
}

    { id:'part_kokoro',    img:'images/puzzle5_part_kokoro.png',    x:112, y:10,  size:42 },
    { id:'part_i',         img:'images/puzzle5_part_i.png',         x:62,  y:72,  size:42 },
    { id:'part_komichi',   img:'images/puzzle5_part_komichi.png',   x:14,  y:148, size:46 },
    { id:'part_minus_chi', img:'images/puzzle5_part_minus_chi.png', x:112, y:153, size:42 },
  ];
  partLayout.forEach(p => {
    const el = document.createElement('div');
    el.className = 'puzzle5-hidden-part';
    el.style.backgroundImage = `url('${p.img}')`;
    el.style.left = p.x + 'px';
    el.style.top = p.y + 'px';
    el.style.width = p.size + 'px';
    el.style.height = p.size + 'px';
    $puzzle5ScratchParts.appendChild(el);
  });

  const canvas = $puzzle5ScratchCanvas;
  canvas.width = 201;
  canvas.height = 233;
  const ctx = canvas.getContext('2d');

  // 黒い塗りつぶし＋「まだ、ばらばら」の文字
  ctx.fillStyle = '#0c0a10';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  ctx.font = '12px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('まだ、ばらばら', canvas.width/2, canvas.height/2);

  ctx.globalCompositeOperation = 'destination-out';

  let scratching = false;
  let toolWarned = false;
  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const p = (e.touches && e.touches.length) ? e.touches[0] : e;
    return {
      x: (p.clientX - rect.left) * (canvas.width / rect.width),
      y: (p.clientY - rect.top) * (canvas.height / rect.height),
    };
  }
  function scratchAt(x, y) {
    ctx.beginPath();
    ctx.arc(x, y, 16, 0, Math.PI * 2);
    ctx.fill();
  }
  function checkCleared() {
    const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
    let transparent = 0;
    for (let i = 3; i < data.length; i += 4 * 20) { // サンプリングで軽量化
      if (data[i] < 30) transparent++;
    }
    const total = data.length / (4 * 20);
    return (transparent / total) > 0.78;
  }

  let cleared = false;
  function onDown(e) {
    e.preventDefault();
    if (!selectedTool) {
      showPopup('まずは道具を選んでみましょう。', null);
      return;
    }
    if (selectedTool !== 'eraser') {
      if (!toolWarned) {
        toolWarned = true;
        const feedback = WRONG_TOOL_FEEDBACK[selectedTool];
        showDialogues(feedback, () => { toolWarned = false; restoreScratchScreen(); });
      }
      return;
    }
    scratching = true;
    const p = getPos(e);
    scratchAt(p.x, p.y);
  }
  function onMove(e) {
    if (!scratching || cleared || selectedTool !== 'eraser') return;
    e.preventDefault();
    const p = getPos(e);
    scratchAt(p.x, p.y);
    if (checkCleared()) {
      cleared = true;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      finishScratch();
    }
  }
  function onUp() { scratching = false; }

  function finishScratch() {
    canvas.removeEventListener('mousedown', onDown);
    canvas.removeEventListener('touchstart', onDown);
    canvas.removeEventListener('mousemove', onMove);
    canvas.removeEventListener('touchmove', onMove);
    canvas.removeEventListener('mouseup', onUp);
    canvas.removeEventListener('touchend', onUp);
    $puzzle5ToolsArea.innerHTML = '';
    setTimeout(() => {
      showDialogues([
        { speaker:'澪',       text:'……これは？' },
        { speaker:'澪',       text:'田んぼみたいな札……心の形……それから、「い」……。' },

        { speaker:'ミネット', text:'うーん……これだけだと、まだわからないね？' },
        { speaker:'ノワール', text:'ええ。今はまだ、ばらばらです。' },
        { speaker:'澪',       text:'まだ、ばらばら……。' },
        { speaker:'澪',       text:'この言葉も、ヒントなんでしょうか。' },
        { speaker:'ノワール', text:'その可能性はあります。' },
        { speaker:'澪',       text:'でも、ばらばらのものを、どうすれば……。' },
        { speaker:'ミネット', text:'ノワールさんと、ミネット！' },
        { speaker:'澪',       text:'え？ ノワールさんと、ミネット……？' },
        { speaker:'ノワール', text:'ほほう。' },
        { speaker:'ミネット', text:'わたしたち、二人でひとつだね！' },
        { speaker:'ノワール', text:'そうですね。' },
        { speaker:'澪',       text:'二人で、ひとつ……。' },
      ], () => fadeIn(() => playPuzzle5MakeOmo(onClear)));
    }, 500);
  }

  canvas.addEventListener('mousedown', onDown);
  canvas.addEventListener('touchstart', onDown, { passive:false });
  canvas.addEventListener('mousemove', onMove);
  canvas.addEventListener('touchmove', onMove, { passive:false });
  canvas.addEventListener('mouseup', onUp);
  canvas.addEventListener('touchend', onUp);
}

function buildPuzzle5Parts(parts, onDropCallback, onClear, stageKey) {
  $puzzle5PartsArea.innerHTML = '';
  const placed = new Set();

  parts.forEach(part => {
    const card = document.createElement('div');
    card.className = 'puzzle5-part-card';
    card.style.backgroundImage = `url('${part.img}')`;
    card.dataset.partId = part.id;
    attachPuzzle5DragHandlers(card, part, () => {
      placed.add(part.id);
      card.classList.add('placed');
      card.style.pointerEvents = 'none';
      if (placed.size === parts.length) {
        showPuzzle5CombineResult(stageKey);
        setTimeout(() => handlePuzzle5StageComplete(stageKey, onClear), 1200);
      }
    });
    $puzzle5PartsArea.appendChild(card);
  });
}

function attachPuzzle5DragHandlers(card, part, onDropSuccess) {
  let startX, startY, origLeft, origTop, dragging = false;

  function getPoint(e) {
    if (e.touches && e.touches.length) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
    return { x: e.clientX, y: e.clientY };
  }
  function onStart(e) {
    e.preventDefault();
    dragging = true;
    const rect = card.getBoundingClientRect();
    const containerRect = $container.getBoundingClientRect();
    origLeft = rect.left - containerRect.left;
    origTop = rect.top - containerRect.top;
    const p = getPoint(e);
    startX = p.x; startY = p.y;
    card.style.position = 'absolute';
    card.style.left = origLeft + 'px';
    card.style.top = origTop + 'px';
    card.classList.add('dragging');
    $container.appendChild(card);
    document.addEventListener('mousemove', onMove);
    document.addEventListener('touchmove', onMove, { passive:false });
    document.addEventListener('mouseup', onEnd);
    document.addEventListener('touchend', onEnd);
  }
  function onMove(e) {
    if (!dragging) return;
    e.preventDefault();
    const p = getPoint(e);
    const dx = p.x - startX;
    const dy = p.y - startY;
    card.style.left = (origLeft + dx) + 'px';
    card.style.top = (origTop + dy) + 'px';
    if (isOverPuzzle5Target(card)) {
      $puzzle5TargetZone.classList.add('drag-over');
    } else {
      $puzzle5TargetZone.classList.remove('drag-over');
    }
  }
  function onEnd(e) {
    if (!dragging) return;
    dragging = false;
    card.classList.remove('dragging');
    $puzzle5TargetZone.classList.remove('drag-over');
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('touchmove', onMove);
    document.removeEventListener('mouseup', onEnd);
    document.removeEventListener('touchend', onEnd);

    if (isOverPuzzle5Target(card)) {
      onDropSuccess();
    } else {
      card.style.position = 'static';
      card.style.left = '';
      card.style.top = '';
    }
  }
  card.addEventListener('mousedown', onStart);
  card.addEventListener('touchstart', onStart, { passive:false });
}

function isOverPuzzle5Target(card) {
  const cardRect = card.getBoundingClientRect();
  const zoneRect = $puzzle5TargetZone.getBoundingClientRect();
  const cx = cardRect.left + cardRect.width/2;
  const cy = cardRect.top + cardRect.height/2;
  return cx > zoneRect.left && cx < zoneRect.right && cy > zoneRect.top && cy < zoneRect.bottom;
}

function playPuzzle6Question(onClear) {
  hideAll();

  $puzzle6FactReveal.classList.remove('show');
  $puzzle6FactReveal.textContent = '';
  $hintBtn.style.display = 'block';
  $hintBtn.onclick = showPuzzle6Hint;

  state.puzzle6.resolved = new Set();
  $puzzle6WordsArea.innerHTML = '';

  PUZZLE6_WORDS.forEach(w => {
    const el = document.createElement('div');
    el.className = 'puzzle6-word' + (w.kind === 'fact' ? ' fact' : '');
    el.textContent = w.text;
    el.style.left = w.x + 'px';
    el.style.top = w.y + 'px';
    el.onclick = () => {
      const feedback = PUZZLE6_TAP_FEEDBACK[w.id];
      if (w.kind === 'reflection') {
        if (!state.puzzle6.resolved.has(w.id)) {
          el.classList.add('fading');
          state.puzzle6.resolved.add(w.id);
          showPopup(feedback.map(f => `${f.speaker}「${f.text}」`).join('\n'), null);
          checkPuzzle6Progress(onClear);
        }
      } else {
        showPopup(feedback.map(f => `${f.speaker}「${f.text}」`).join('\n'), null);
      }
    };
    $puzzle6WordsArea.appendChild(el);
  });
}

function checkPuzzle6Progress(onClear) {

  { order:1, kana:'ま', label:'1 ま / 6 う', x:60,  y:250 },
  { order:2, kana:'だ', label:'2 だ',        x:163, y:50  },

function startPuzzle7Game(onClear) {
  hideAll();
  setBg('puzzle7_star_box_puzzle.png');
  $puzzle7StarScreen.style.display = 'block';
  $hintBtn.style.display = 'block';
  $hintBtn.onclick = showPuzzle7Hint;
  $puzzle7SuccessText.classList.remove('show');
  $puzzle7SuccessText.textContent = '';

  $puzzle7PaperList.innerHTML = [
    '1　900光年', '2　600光年', '3　300光年',
    '4　120光年', '5　60光年', '6　15光年',
  ].join('<br>');

  state.puzzle7.traceIndex = 0;
  state.puzzle7.tracing = false;
  state.puzzle7.points = [];

  // SVGを構築（星の点は order 1〜5 の5地点。6は1と同じ点を再利用）
  while ($puzzle7Svg.children.length > 1) {
    $puzzle7Svg.removeChild($puzzle7Svg.lastChild);
  }
  $puzzle7TracePath.setAttribute('d', '');

  const uniquePoints = PUZZLE7_STAR_POINTS.filter(p => p.order <= 5);
  uniquePoints.forEach(p => {
    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    circle.setAttribute('cx', p.x);
    circle.setAttribute('cy', p.y);
    circle.setAttribute('r', 14);
    circle.setAttribute('class', 'puzzle7-star-point');
    circle.setAttribute('data-order', p.order);
    $puzzle7Svg.appendChild(circle);

    const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    text.setAttribute('x', p.x);
    text.setAttribute('y', p.y - 22);
    text.setAttribute('text-anchor', 'middle');
    text.setAttribute('class', 'puzzle7-star-label');
    text.setAttribute('data-order', p.order);
    text.textContent = p.label;
    $puzzle7Svg.appendChild(text);
  });

  function pointAt(order) {
    return PUZZLE7_STAR_POINTS.find(p => p.order === order);
  }

  function litUpTo(order) {
    $puzzle7Svg.querySelectorAll('.puzzle7-star-point, .puzzle7-star-label').forEach(el => {
      const o = parseInt(el.getAttribute('data-order'), 10);
      if (o <= order) el.classList.add('lit'); else el.classList.remove('lit');
    });
  }

  function updatePath() {
    if (state.puzzle7.points.length < 2) {
      $puzzle7TracePath.setAttribute('d', '');
      return;
    }
    const d = state.puzzle7.points.map((pt, i) => (i === 0 ? 'M' : 'L') + pt.x + ',' + pt.y).join(' ');
    $puzzle7TracePath.setAttribute('d', d);
  }

  function resetTrace() {
    state.puzzle7.traceIndex = 0;
    state.puzzle7.points = [];
    $puzzle7TracePath.setAttribute('d', '');
    litUpTo(0);
    $puzzle7BoxArea.classList.add('wrong');
    setTimeout(() => $puzzle7BoxArea.classList.remove('wrong'), 300);
  }

  function svgCoordsFromEvent(evt) {
    const rect = $puzzle7Svg.getBoundingClientRect();
    const touch = evt.touches ? evt.touches[0] : evt;
    const xRatio = (touch.clientX - rect.left) / rect.width;
    const yRatio = (touch.clientY - rect.top) / rect.height;
    return { x: xRatio * 327, y: yRatio * 320 };
  }

  function nearestPointWithinRadius(x, y) {
    let best = null, bestDist = 30;
    PUZZLE7_STAR_POINTS.filter(p => p.order <= 5).forEach(p => {
      const dist = Math.hypot(p.x - x, p.y - y);
      if (dist <= bestDist) { best = p; bestDist = dist; }
    });
    return best;
  }

  function tryAdvance(x, y) {
    const expectedOrder = state.puzzle7.traceIndex + 1;
    // 6番目は1番目と同じ座標
    const expectedPoint = expectedOrder === 6 ? pointAt(1) : pointAt(expectedOrder);
    const hit = nearestPointWithinRadius(x, y);
    if (hit && expectedPoint && hit.order === expectedPoint.order) {
      state.puzzle7.traceIndex = expectedOrder;
      state.puzzle7.points.push({ x: expectedPoint.x, y: expectedPoint.y });
      updatePath();
      litUpTo(Math.min(expectedOrder, 5));
      if (expectedOrder === 6) {
        finishPuzzle7(onClear);
      }
    } else if (hit && state.puzzle7.traceIndex === 0 && hit.order !== 1) {
      // 最初のタッチが1以外ならリセット（無反応のまま）
    } else if (hit) {
      resetTrace();
    }
  }

  function onDown(evt) {
    evt.preventDefault();
    if (state.puzzle7.traceIndex >= 6) return;
    state.puzzle7.tracing = true;
    const { x, y } = svgCoordsFromEvent(evt);
    if (state.puzzle7.traceIndex === 0) {
      tryAdvance(x, y);
    }
  }
  function onMove(evt) {
    if (!state.puzzle7.tracing || state.puzzle7.traceIndex >= 6) return;
    evt.preventDefault();
    const { x, y } = svgCoordsFromEvent(evt);
    tryAdvance(x, y);
  }
  function onUp() {
    state.puzzle7.tracing = false;
  }

  $puzzle7Svg.onpointerdown = onDown;
  $puzzle7Svg.onpointermove = onMove;
  $puzzle7Svg.onpointerup = onUp;
  $puzzle7Svg.onpointerleave = onUp;
  $puzzle7Svg.addEventListener('touchstart', onDown, { passive:false });
  $puzzle7Svg.addEventListener('touchmove', onMove, { passive:false });
  $puzzle7Svg.addEventListener('touchend', onUp);

  litUpTo(0);
}

function attachPuzzle8DragHandlers(card, cardData, onClear) {
  let startX, startY, origLeft, origTop, dragging = false;

  function getPoint(e) {
    if (e.touches && e.touches.length) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
    return { x: e.clientX, y: e.clientY };
  }
  function onStart(e) {
    e.preventDefault();
    dragging = true;
    const rect = card.getBoundingClientRect();
    const containerRect = $container.getBoundingClientRect();
    origLeft = rect.left - containerRect.left;
    origTop = rect.top - containerRect.top;
    const p = getPoint(e);
    startX = p.x; startY = p.y;
    card.style.position = 'absolute';
    card.style.left = origLeft + 'px';
    card.style.top = origTop + 'px';
    card.classList.add('dragging');
    $container.appendChild(card);
    document.addEventListener('mousemove', onMove);
    document.addEventListener('touchmove', onMove, { passive:false });
    document.addEventListener('mouseup', onEnd);
    document.addEventListener('touchend', onEnd);
  }
  function onMove(e) {
    if (!dragging) return;
    e.preventDefault();
    const p = getPoint(e);
    const dx = p.x - startX;
    const dy = p.y - startY;
    card.style.left = (origLeft + dx) + 'px';
    card.style.top = (origTop + dy) + 'px';
    $puzzle8PlateLeft.classList.toggle('drag-over', isOverZone(card, $puzzle8PlateLeft));
    $puzzle8PlateRight.classList.toggle('drag-over', isOverZone(card, $puzzle8PlateRight));
  }
  function onEnd(e) {
    if (!dragging) return;
    dragging = false;
    card.classList.remove('dragging');
    $puzzle8PlateLeft.classList.remove('drag-over');
    $puzzle8PlateRight.classList.remove('drag-over');
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('touchmove', onMove);
    document.removeEventListener('mouseup', onEnd);
    document.removeEventListener('touchend', onEnd);

    const overLeft  = isOverZone(card, $puzzle8PlateLeft);
    const overRight = isOverZone(card, $puzzle8PlateRight);

    if (overLeft || overRight) {
      const droppedSide = overLeft ? 'left' : 'right';
      if (droppedSide === cardData.side) {
        card.classList.add('placed-correct');
        card.style.pointerEvents = 'none';
        if (droppedSide === 'left') state.puzzle8.leftPlaced.add(cardData.id);
        else state.puzzle8.rightPlaced.add(cardData.id);
        snapCardToPlate(card, droppedSide === 'left' ? $puzzle8PlateLeft : $puzzle8PlateRight, droppedSide === 'left' ? state.puzzle8.leftPlaced.size : state.puzzle8.rightPlaced.size);
        checkPuzzle8SortComplete(onClear);
      } else {
        card.classList.add('placed-wrong');
        setTimeout(() => card.classList.remove('placed-wrong'), 400);
        card.style.position = 'static';
        card.style.left = '';
        card.style.top = '';
      }
    } else {
      card.style.position = 'static';
      card.style.left = '';
      card.style.top = '';
    }
  }
  card.addEventListener('mousedown', onStart);
  card.addEventListener('touchstart', onStart, { passive:false });
}

function isOverZone(card, zone) {
  const cardRect = card.getBoundingClientRect();
  const zoneRect = zone.getBoundingClientRect();
  const cx = cardRect.left + cardRect.width/2;
  const cy = cardRect.top + cardRect.height/2;
  return cx >= zoneRect.left && cx <= zoneRect.right && cy >= zoneRect.top && cy <= zoneRect.bottom;
}

function snapCardToPlate(card, zone, indexInPlate) {
  const containerRect = $container.getBoundingClientRect();
  const zoneRect = zone.getBoundingClientRect();
  const offsetX = ((indexInPlate - 1) % 4) * 8;
  const targetLeft = (zoneRect.left - containerRect.left) + zoneRect.width/2 - 46 + offsetX;
  const targetTop  = (zoneRect.top - containerRect.top) + zoneRect.height/2 - 61 - (indexInPlate * 4);
  card.style.left = targetLeft + 'px';
  card.style.top = targetTop + 'px';
  card.style.zIndex = 60 + indexInPlate;
}

function checkPuzzle8SortComplete(onClear) {

    if (!dragging) return;
    dragging = false;
    card.classList.remove('dragging');
    slots.forEach(s => s.classList.remove('drag-over'));
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('touchmove', onMove);
    document.removeEventListener('mouseup', onEnd);
    document.removeEventListener('touchend', onEnd);

    const targetSlot = slots.find(s => isOverZone(card, s) && !s.classList.contains('filled'));
    if (targetSlot) {
      const idx = parseInt(targetSlot.dataset.slotIndex, 10);
      state.puzzle8.reorderFilled[idx] = kanaData;
      targetSlot.classList.add('filled');
      const containerRect = $container.getBoundingClientRect();
      const slotRect = targetSlot.getBoundingClientRect();
      card.style.left = (slotRect.left - containerRect.left) + 'px';
      card.style.top = (slotRect.top - containerRect.top) + 'px';
      card.classList.add('placed');
      card.style.pointerEvents = 'none';
      checkPuzzle8ReorderComplete(onClear);
    } else {
      card.style.position = 'static';
      card.style.left = '';
      card.style.top = '';
    }
  }
  card.addEventListener('mousedown', onStart);
  card.addEventListener('touchstart', onStart, { passive:false });
}

function checkPuzzle8ReorderComplete(onClear) {
  if (state.puzzle8.reorderFilled.some(v => v === null)) return;
  const isCorrect = state.puzzle8.reorderFilled.every((k, i) => k.order === i + 1);
  if (isCorrect) {
    setTimeout(() => finishPuzzle8Reorder(onClear), 400);
  } else {
    setTimeout(() => {
      showPopup('まだ、順番が違うようです。もう一度並べてみましょう。', () => {
        startPuzzle8Reorder(onClear);
      });
    }, 400);
  }
}

function buildPuzzle9Grid() {
  const rows = PUZZLE9_MAP.length;
  const cols = PUZZLE9_MAP[0].length;
  const cell = state.puzzle9.cellSize;
  $puzzle9MazeGrid.style.width  = (cols * cell) + 'px';
  $puzzle9MazeGrid.style.height = (rows * cell) + 'px';
  $puzzle9MazeGrid.style.left = '50%';
  $puzzle9MazeGrid.style.marginLeft = (-(cols * cell) / 2) + 'px';
  $puzzle9MazeGrid.innerHTML = '';

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const div = document.createElement('div');
      const isGoal = (r === PUZZLE9_GOAL.r && c === PUZZLE9_GOAL.c);
      div.className = 'puzzle9-cell ' + (PUZZLE9_MAP[r][c] === 1 ? 'wall' : (isGoal ? 'goal' : 'path'));
      div.style.left = (c * cell) + 'px';
      div.style.top  = (r * cell) + 'px';
      div.style.width = cell + 'px';
      div.style.height = cell + 'px';
      $puzzle9MazeGrid.appendChild(div);
    }
  }
}

let $puzzle9PlayerEl = null;
let $puzzle9ShadowEl = null;
const $puzzle9ItemEls = {};

function renderPuzzle9Items() {
  PUZZLE9_ITEMS_INIT.forEach(item => {
    if (state.puzzle9.itemsCollected.has(item.id)) return;
    if ($puzzle9ItemEls[item.id]) return;
    const cell = state.puzzle9.cellSize;
    const size = Math.round(cell * 0.66);
    const el = document.createElement('div');
    el.className = 'puzzle9-item';
    el.style.left = (item.c * cell + (cell - size) / 2) + 'px';
    el.style.top  = (item.r * cell + (cell - size) / 2) + 'px';
    el.style.width = size + 'px';
    el.style.height = size + 'px';
    $puzzle9MazeGrid.appendChild(el);
    $puzzle9ItemEls[item.id] = el;
  });
}

function positionPuzzle9Entities() {
  const cell = state.puzzle9.cellSize;
  const pSize = Math.round(cell * 1.1);
  const pOffset = (cell - pSize) / 2;
  $puzzle9PlayerEl.style.left = (state.puzzle9.player.c * cell + pOffset) + 'px';
  $puzzle9PlayerEl.style.top  = (state.puzzle9.player.r * cell + pOffset - cell*0.15) + 'px';
  const shadowPos = PUZZLE9_SHADOW_ROUTE[state.puzzle9.shadowRouteIndex];
  const sSize = Math.round(cell * 1.1);
  const sOffset = (cell - sSize) / 2;
  $puzzle9ShadowEl.style.left = (shadowPos.c * cell + sOffset) + 'px';
  $puzzle9ShadowEl.style.top  = (shadowPos.r * cell + sOffset - cell*0.15) + 'px';
}

function updatePuzzle9ItemCounter() {
  $puzzle9ItemCounter.textContent = `🪶 ${state.puzzle9.itemsCollected.size} / ${PUZZLE9_ITEMS_INIT.length}`;
}

function startPuzzle9Maze(onClear) {
  hideAll();
  setBg('puzzle9_mio_faces_shadow_maze.png');
  $puzzle9Screen.style.display = 'block';
  $puzzle9Prompt.textContent = '影に追いつかれないように、月羽のかけらを集めよう。';
  $hintBtn.style.display = 'block';
  $hintBtn.onclick = showPuzzle9Hint;

  state.puzzle9.player = { r: PUZZLE9_START.r, c: PUZZLE9_START.c };
  state.puzzle9.shadowRouteIndex = PUZZLE9_SHADOW_START_INDEX;
  state.puzzle9.itemsCollected = new Set();
  state.puzzle9.moving = false;
  state.puzzle9.cleared = false;

  buildPuzzle9Grid();

  const cell = state.puzzle9.cellSize;
  const entitySize = Math.round(cell * 1.1);
  $puzzle9PlayerEl = document.createElement('div');
  $puzzle9PlayerEl.className = 'puzzle9-player';
  $puzzle9PlayerEl.style.width = entitySize + 'px';
  $puzzle9PlayerEl.style.height = entitySize + 'px';
  $puzzle9MazeGrid.appendChild($puzzle9PlayerEl);

  $puzzle9ShadowEl = document.createElement('div');
  $puzzle9ShadowEl.className = 'puzzle9-shadow';
  $puzzle9ShadowEl.style.width = entitySize + 'px';
  $puzzle9ShadowEl.style.height = entitySize + 'px';
  $puzzle9MazeGrid.appendChild($puzzle9ShadowEl);

  Object.keys($puzzle9ItemEls).forEach(k => delete $puzzle9ItemEls[k]);
  renderPuzzle9Items();
  positionPuzzle9Entities();
  updatePuzzle9ItemCounter();

  function tryMove(dr, dc) {
    if (state.puzzle9.moving || state.puzzle9.cleared) return;
    const nr = state.puzzle9.player.r + dr;
    const nc = state.puzzle9.player.c + dc;
    if (nr < 0 || nc < 0 || nr >= PUZZLE9_MAP.length || nc >= PUZZLE9_MAP[0].length) return;
    if (PUZZLE9_MAP[nr][nc] === 1) return;

    state.puzzle9.moving = true;
    state.puzzle9.player = { r: nr, c: nc };

    // 影が1歩進む
    state.puzzle9.shadowRouteIndex = (state.puzzle9.shadowRouteIndex + 1) % PUZZLE9_SHADOW_ROUTE.length;

    positionPuzzle9Entities();

    // アイテム取得判定（月羽のかけら）
    PUZZLE9_ITEMS_INIT.forEach(item => {
      if (!state.puzzle9.itemsCollected.has(item.id) && item.r === nr && item.c === nc) {
        state.puzzle9.itemsCollected.add(item.id);
        const el = $puzzle9ItemEls[item.id];
        if (el) { el.remove(); delete $puzzle9ItemEls[item.id]; }
        updatePuzzle9ItemCounter();
        showToast('🪶 月羽のかけらを見つけた');
      }
    });

    setTimeout(() => {
      // 衝突判定
      const shadowPos = PUZZLE9_SHADOW_ROUTE[state.puzzle9.shadowRouteIndex];
      if (shadowPos.r === state.puzzle9.player.r && shadowPos.c === state.puzzle9.player.c) {
        catchPuzzle9ByShadow(onClear);
        return;
      }
      // ゴール判定
      if (nr === PUZZLE9_GOAL.r && nc === PUZZLE9_GOAL.c) {
        if (state.puzzle9.itemsCollected.size === PUZZLE9_ITEMS_INIT.length) {
          state.puzzle9.cleared = true;
          $hintBtn.style.display = 'none';
          setTimeout(() => playPuzzle9ClearAnimation(onClear), 350);
        } else {
          showPopup('まだ、月羽のかけらを集め切っていないようです。', null);
        }
      }
      state.puzzle9.moving = false;
    }, 190);
  }

  // 影に触れた場合：スタートに戻るが、集めた月羽のかけらは保持する（優しめ仕様）
  function catchPuzzle9ByShadow(onClear) {
    $puzzle9CaughtFlash.classList.add('flash');
    setTimeout(() => {
      $puzzle9CaughtFlash.classList.remove('flash');
      state.puzzle9.player = { r: PUZZLE9_START.r, c: PUZZLE9_START.c };
      state.puzzle9.shadowRouteIndex = PUZZLE9_SHADOW_START_INDEX;
      positionPuzzle9Entities();
      state.puzzle9.moving = false;
      showPopup('影に触れた。けれど、これは終わりではない。もう一度、道を選ぼう。', null);
    }, 260);
  }

  $puzzle9CtrlUp.onclick    = () => tryMove(-1, 0);
  $puzzle9CtrlDown.onclick  = () => tryMove(1, 0);
  $puzzle9CtrlLeft.onclick  = () => tryMove(0, -1);
  $puzzle9CtrlRight.onclick = () => tryMove(0, 1);

  // キーボードでも操作可能に（PC確認用）
  const keyHandler = (e) => {
    if (e.key === 'ArrowUp') tryMove(-1, 0);
    else if (e.key === 'ArrowDown') tryMove(1, 0);
    else if (e.key === 'ArrowLeft') tryMove(0, -1);
    else if (e.key === 'ArrowRight') tryMove(0, 1);
  };
  document.addEventListener('keydown', keyHandler);
  window._puzzle9KeyHandler = keyHandler;
}

function startPuzzle10Matching(onClear) {
  hideAll();
  setBg('puzzle10_matching_screen.png');
  $puzzle10Screen.style.display = 'block';
  $puzzle10Prompt.textContent = '便箋に浮かんだ「澪の小さな声」に対して、もっともやさしく寄り添う返事カードを選んでください。';
  $hintBtn.style.display = 'block';
  $hintBtn.onclick = showPuzzle10Hint;

  state.puzzle10.selectedVoiceId = null;
  state.puzzle10.solved = new Set();

  $puzzle10VoicesArea.innerHTML = '';
  const voiceEls = {};
  PUZZLE10_VOICES.forEach(v => {
    const el = document.createElement('div');
    el.className = 'puzzle10-voice-card';
    el.textContent = v.text;
    el.dataset.voiceId = v.id;
    el.onclick = () => {
      if (state.puzzle10.solved.has(v.id)) return;
      $puzzle10VoicesArea.querySelectorAll('.puzzle10-voice-card').forEach(e => e.classList.remove('selected'));
      el.classList.add('selected');
      state.puzzle10.selectedVoiceId = v.id;
    };
    $puzzle10VoicesArea.appendChild(el);
    voiceEls[v.id] = el;
  });

  $puzzle10RepliesArea.innerHTML = '';
  PUZZLE10_REPLY_CARDS.forEach(replyText => {
    const el = document.createElement('div');
    el.className = 'puzzle10-reply-card';
    el.textContent = replyText;
    el.onclick = () => {
      if (!state.puzzle10.selectedVoiceId) {
        showPopup('まず、声を選んでください。', null);
        return;
      }
      const voiceId = state.puzzle10.selectedVoiceId;
      const match = PUZZLE10_MATCHES[voiceId];
      if (match.reply === replyText) {
        state.puzzle10.solved.add(voiceId);
        voiceEls[voiceId].classList.remove('selected');
        voiceEls[voiceId].classList.add('solved');
        el.classList.add('used');
        state.puzzle10.selectedVoiceId = null;
        showPuzzle10RevealFragment(match.reveal);
        if (state.puzzle10.solved.size === PUZZLE10_VOICES.length) {
          $hintBtn.style.display = 'none';
          setTimeout(() => { hideAll(); playPuzzle10Clear(onClear); }, 1400);
        }
      } else {
        const feedback = PUZZLE10_WRONG_FEEDBACK[replyText];
        if (feedback) {
          showDialogues(feedback, () => {});
        } else {
          showPopup('それは、今の澪さんの声には少し違うようです。', null);
        }
      }
    };
    $puzzle10RepliesArea.appendChild(el);
  });
}

// 画面サイズに応じた自動スケーリング（ブラウザの上下バーで隠れる対策）
// ============================================================
function fitGameToViewport() {
  const vw = window.innerWidth;
  const vh = window.visualViewport ? window.visualViewport.height : window.innerHeight;
  const scale = Math.min(vw / 375, vh / 667, 1);
  $container.style.transform = `scale(${scale})`;
  $container.style.transformOrigin = 'center center';
}
window.addEventListener('resize', fitGameToViewport);
window.addEventListener('orientationchange', fitGameToViewport);
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', fitGameToViewport);
}
// キーボード表示/非表示でも追従させる（input/textareaにフォーカスした時）
document.addEventListener('focusin', (e) => {
  if (e.target.matches('input, textarea')) {
    setTimeout(fitGameToViewport, 50);
    setTimeout(fitGameToViewport, 350);
  }
});
document.addEventListener('focusout', (e) => {
  if (e.target.matches('input, textarea')) {
    setTimeout(fitGameToViewport, 50);
    setTimeout(fitGameToViewport, 350);
  }
});
fitGameToViewport();

window.onload = () => {
  setBg('title_01_letter_phone_moon.png');
  const saved = loadProgress();

  const ss = document.createElement('div');
  ss.id = 'start-screen';
  ss.style.cssText = `
    position:absolute;top:0;left:0;right:0;bottom:0;
    display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
    padding-top:300px;
    z-index:200;
    cursor:pointer;
  `;

  const continueBtnHtml = saved ? `
    <button id="game-continue-btn" class="start-screen-btn" style="
      background:rgba(70,45,120,0.7);
      border:1px solid rgba(180,150,220,0.6);
      border-radius:24px;
      color:#f0e0ff;
      font-family:inherit;
      font-size:15px;
      letter-spacing:0.18em;
      padding:14px 44px;
      cursor:pointer;
      margin-bottom:14px;
      box-shadow:0 4px 16px rgba(0,0,0,0.5);
    ">つづきから</button>
  ` : '';

  const startLabel = saved ? 'はじめから' : 'はじめる';

  ss.innerHTML = `
    ${continueBtnHtml}
    <button id="game-start-btn" class="start-screen-btn" style="
      background:${saved ? 'rgba(40,32,56,0.7)' : 'rgba(70,45,120,0.7)'};
      border:1px solid rgba(180,150,220,0.6);
      border-radius:24px;
      color:#f0e0ff;
      font-family:inherit;
      font-size:15px;
      letter-spacing:0.18em;
      padding:14px 44px;
      cursor:pointer;
      box-shadow:0 4px 16px rgba(0,0,0,0.5);
    ">${startLabel}</button>
    <div id="start-screen-tap-hint">画面をタップしてください</div>
  `;
  $container.appendChild(ss);

  let buttonsRevealed = false;
  function revealStartButtons() {
    if (buttonsRevealed) return;
    buttonsRevealed = true;
    document.querySelectorAll('.start-screen-btn').forEach(btn => btn.classList.add('show'));
    const hint = document.getElementById('start-screen-tap-hint');
    if (hint) hint.remove();
  }

  ss.addEventListener('click', (e) => {
    if (!buttonsRevealed) {
      revealStartButtons();
      return;
    }
  });

  if (saved) {
    document.getElementById('game-continue-btn').onclick = (e) => {
      if (!buttonsRevealed) return;
      e.stopPropagation();
      startBgm();
      ss.remove();
      state.moonDrops = saved.moonDrops || 0;
      state.collectedDrops = new Set(saved.collectedDrops || []);
      $dropCount.textContent = state.moonDrops;
      const resumeFn = RESUME_FUNCTIONS[saved.checkpoint];
      fadeIn(() => {
        if (resumeFn) {
          resumeFn();
        } else {
          startGame();
        }
      });
    };
  }

  document.getElementById('game-start-btn').onclick = (e) => {
    if (!buttonsRevealed) return;
    e.stopPropagation();
    startBgm();
    ss.remove();
    clearProgress();
    startGame();
  };
};
</script>
